<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <div>
        <h3>Listas não ordenadas: </h3>
        <ul type="circle">
            <li>Café</li>
            <li>Chá</li>
            <li>Coca Cola</li>
        </ul>
        
        <ul type="square">
            <li>Café</li>
            <li>Chá</li>
            <li>Coca Cola</li>
        </ul>
    </div>


    <div>
        <h3>Listas solicitadas</h3>

        <ol type="1">
            <li>Café</li>
            <li>Chá</li>
            <li>Coca Cola</li>
        </ol>

        <ol type="I">
            <li>Café</li>
            <li>Chá</li>
            <li>Coca Cola</li>
        </ol>
    </div>


</body>
</html>
